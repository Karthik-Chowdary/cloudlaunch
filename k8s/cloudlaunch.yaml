apiVersion: v1
kind: Namespace
metadata:
  name: cloudlaunch
  labels:
    app.kubernetes.io/name: cloudlaunch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudlaunch
  namespace: cloudlaunch
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudlaunch-aws
  namespace: cloudlaunch
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudlaunch
  namespace: cloudlaunch
  labels:
    app.kubernetes.io/name: cloudlaunch
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudlaunch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudlaunch
    spec:
      serviceAccountName: cloudlaunch
      containers:
        - name: cloudlaunch
          image: cloudlaunch:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3002
              protocol: TCP
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: production
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloudlaunch-aws
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloudlaunch-aws
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_REGION
              value: us-east-1
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cloudlaunch
  namespace: cloudlaunch
  labels:
    app.kubernetes.io/name: cloudlaunch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: cloudlaunch
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudlaunch
  namespace: cloudlaunch
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: cloudlaunch.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cloudlaunch
                port:
                  name: http
